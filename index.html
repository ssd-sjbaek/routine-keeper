<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루틴 지킴이</title>
  <style>
    :root {
      --color-bg:     #b2e0f7;
      --color-border: #88ccee;
      --color-accent: #4488bb;
      --color-card:   #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
      background: var(--color-bg);
      color: #334455;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 보케 배경 */
    .bokeh-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bokeh-bg span { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.55; }
    .bokeh-bg .b1 { width: 240px; height: 240px; background: var(--color-bg); top: -60px; left: -70px; }
    .bokeh-bg .b2 { width: 180px; height: 180px; background: var(--color-bg); top: 100px; right: -50px; opacity: 0.4; }
    .bokeh-bg .b3 { width: 280px; height: 280px; background: var(--color-bg); bottom: 40px; left: -80px; opacity: 0.35; }
    .bokeh-bg .b4 { width: 160px; height: 160px; background: var(--color-bg); bottom: -40px; right: 10px; opacity: 0.45; }
    .bokeh-bg .b5 { width: 140px; height: 140px; background: var(--color-bg); top: 45%; left: 35%; opacity: 0.3; }

    /* 로그인 화면 */
    #screen-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 40px);
      position: relative;
      z-index: 1;
    }
    .login-card {
      background: var(--color-card);
      border: 2.5px solid var(--color-border);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(100,160,220,0.18);
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-accent);
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 13px;
      color: #99bbcc;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: white;
      border: 1.5px solid var(--color-border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-accent);
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-google:hover { background: #f4fbff; }

    /* 메인 카드 */
    .card {
      background: var(--color-card);
      border: 2.5px solid var(--color-border);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(100,160,220,0.15);
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* 싸이월드 헤더 */
    .mh-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: color-mix(in srgb, var(--color-bg) 30%, white);
      border-bottom: 2px solid var(--color-border);
    }
    .mh-avatar {
      width: 42px; height: 42px;
      background: color-mix(in srgb, var(--color-bg) 60%, white);
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .mh-info { flex: 1; min-width: 0; }
    .mh-title { font-size: 15px; font-weight: bold; color: var(--color-accent); }
    .mh-sub { font-size: 11px; color: color-mix(in srgb, var(--color-accent) 60%, #aaa); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mh-streak {
      background: color-mix(in srgb, var(--color-bg) 40%, white);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--color-accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* 탭바 */
    .tab-bar {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      background: color-mix(in srgb, var(--color-bg) 10%, white);
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      padding: 10px 8px;
      font-size: 13px;
      color: #aabbcc;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .tab-btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
      font-weight: 700;
      background: white;
    }

    /* 날짜 힌트바 */
    .date-hint-bar {
      padding: 8px 16px;
      font-size: 11px;
      color: color-mix(in srgb, var(--color-accent) 60%, #aaa);
      text-align: center;
      background: color-mix(in srgb, var(--color-bg) 8%, white);
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 40%, white);
    }

    /* 섹션 공통 */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 12px 14px 0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-accent);
    }
    .section-btn {
      background: color-mix(in srgb, var(--color-bg) 20%, white);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--color-accent);
      cursor: pointer;
      font-family: inherit;
    }
    .section-btn:hover { background: color-mix(in srgb, var(--color-bg) 40%, white); }

    /* 루틴 목록 */
    #routine-list { padding: 0 12px; }
    .routine-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-card);
      border: 1px solid color-mix(in srgb, var(--color-border) 40%, white);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 5px;
      transition: background 0.15s;
      user-select: none;
    }
    .routine-item:hover { background: color-mix(in srgb, var(--color-bg) 15%, white); }
    .routine-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--color-accent);
      cursor: pointer;
    }
    .routine-item.done { background: color-mix(in srgb, var(--color-bg) 12%, white); }
    .routine-item.done .routine-name { text-decoration: line-through; color: #aabbcc; }
    .progress {
      text-align: right;
      font-size: 12px;
      color: #aabbcc;
      padding: 6px 14px 10px;
    }

    /* 드래그 핸들 */
    .drag-handle {
      cursor: grab;
      padding: 0 8px 0 2px;
      color: #ccc;
      font-size: 16px;
      user-select: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }

    /* 삭제 버튼 */
    .routine-delete, .todo-delete {
      margin-left: auto;
      background: none;
      border: none;
      color: #ccc;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .routine-delete:hover, .todo-delete:hover { color: #e57373; }

    /* 입력 행 */
    .add-input-row {
      display: flex;
      gap: 8px;
      margin: 8px 12px 10px;
    }
    .add-input {
      flex: 1;
      border: 1.5px solid var(--color-border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      color: #334455;
    }
    .add-input:focus { border-color: var(--color-accent); }
    .add-btn {
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .add-btn:hover { opacity: 0.85; }

    /* 할 일 섹션 */
    .todo-section {
      margin-top: 0;
      border-top: 1px solid color-mix(in srgb, var(--color-border) 30%, white);
      margin: 8px 0 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-card);
      border: 1px solid color-mix(in srgb, var(--color-border) 30%, white);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin: 0 12px 5px;
    }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aabbcc; }
    .todo-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--color-accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .todo-text { flex: 1; }

    /* 하단 네비 */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 10px 0 12px;
      border-top: 2px solid var(--color-border);
      background: color-mix(in srgb, var(--color-bg) 10%, white);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #aabbcc;
      cursor: pointer;
      padding: 2px 16px;
      border-radius: 10px;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--color-accent); font-weight: bold; }
    .nav-item:hover { color: var(--color-accent); }
    .nav-icon { font-size: 18px; }

    /* 서브 화면 헤더 */
    .sub-screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 480px;
      margin: 0 auto 16px;
      font-size: 14px;
      color: #99bbcc;
      position: relative;
      z-index: 1;
    }
    .back-btn {
      background: color-mix(in srgb, var(--color-bg) 30%, white);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 6px 14px;
      color: var(--color-accent);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .back-btn:hover { background: color-mix(in srgb, var(--color-bg) 50%, white); }

    /* 설정 화면 */
    #screen-schedule, #screen-settings { position: relative; z-index: 1; }
    .settings-card {
      background: var(--color-card);
      border: 2px solid var(--color-border);
      border-radius: 16px;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 3px 16px rgba(100,160,220,0.12);
    }
    .settings-section-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--color-accent);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 40%, white);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .color-row-label { font-size: 12px; color: #556677; min-width: 80px; }
    .color-row-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .swatches { display: flex; gap: 5px; }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.08);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { box-shadow: 0 0 0 2px white, 0 0 0 4px #446; }
    .hex-input {
      width: 80px; height: 28px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      padding: 0 8px;
      font-size: 11px;
      color: #334455;
      font-family: monospace;
      outline: none;
    }
    .hex-input:focus { border-color: var(--color-accent); }
    .save-theme-btn {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: var(--color-accent);
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      font-family: inherit;
    }
    .save-theme-btn:hover { opacity: 0.88; }
    .logout-btn {
      width: 100%;
      padding: 10px;
      background: none;
      border: 1.5px solid #dde;
      border-radius: 10px;
      font-size: 13px;
      color: #889;
      cursor: pointer;
      font-family: inherit;
    }
    .logout-btn:hover { border-color: #e57373; color: #e57373; }

    /* 통계 */
    .stats-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 12px 14px 0;
    }
    .stats-reset-btn {
      background: none;
      border: 1px solid #dde;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: #bbb;
      cursor: pointer;
      font-family: inherit;
    }
    .stats-reset-btn:hover { color: #e57373; border-color: #e57373; }
    .streak-card {
      background: color-mix(in srgb, var(--color-bg) 20%, white);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      margin: 0 14px 16px;
    }
    .streak-item { flex: 1; text-align: center; }
    .streak-num { font-size: 22px; font-weight: 800; color: var(--color-accent); line-height: 1.2; }
    .streak-label { font-size: 11px; color: #aabbcc; margin-top: 2px; }
    .streak-divider { width: 1px; background: var(--color-border); height: 36px; flex-shrink: 0; }
    .stats-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-accent);
      margin-bottom: 8px;
      padding: 0 14px;
    }
    .stats-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      text-align: center;
      margin-bottom: 8px;
      padding: 0 14px;
    }
    .stats-cal-header { font-size: 10px; color: #aaa; padding: 2px 0; }
    .stats-cal-day {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      margin: 0 auto;
    }
    .stats-cal-day.done { background: color-mix(in srgb, var(--color-bg) 80%, white); color: var(--color-accent); }
    .stats-cal-day.missed { background: #f5f5f5; color: #ccc; }
    .stats-cal-day.today { background: color-mix(in srgb, var(--color-bg) 40%, white); border: 2px solid var(--color-border); color: var(--color-accent); font-weight: 700; }
    .stats-cal-day.future { color: #ddd; }
    .stats-cal-legend {
      display: flex; gap: 10px;
      font-size: 11px; color: #aaa;
      margin-bottom: 16px;
      padding: 0 14px;
    }
    .stats-cal-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .rate-row { margin-bottom: 8px; padding: 0 14px; }
    .rate-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .rate-bar-bg { background: #eee; border-radius: 4px; height: 7px; }
    .rate-bar-fill { height: 7px; border-radius: 4px; }
    .rate-bar-fill.good { background: color-mix(in srgb, var(--color-bg) 80%, white); }
    .rate-bar-fill.low  { background: #ffc4a0; }
    .full-reset-area {
      margin-top: 20px;
      padding: 14px;
      border-top: 1px solid color-mix(in srgb, var(--color-border) 30%, white);
      text-align: center;
    }
    .full-reset-btn {
      background: none; border: none;
      font-size: 12px; color: #ccc;
      cursor: pointer; font-family: inherit;
    }
    .full-reset-btn:hover { color: #e57373; }

    /* ── 새 캘린더 ── */
    .cal-month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: bold;
      color: var(--color-accent);
    }
    .cal-nav-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: var(--color-accent);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .cal-nav-btn:hover { background: color-mix(in srgb, var(--color-bg) 40%, white); }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      max-width: 480px;
      margin: 8px auto 0;
      position: relative;
      z-index: 1;
      padding: 0 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      color: #99bbcc;
      padding: 4px 0;
      font-weight: 600;
    }
    .cal-day {
      background: var(--color-card);
      border: 1px solid color-mix(in srgb, var(--color-border) 40%, white);
      border-radius: 8px;
      padding: 4px 3px 5px;
      text-align: center;
      cursor: pointer;
      min-height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      box-shadow: 0 1px 3px rgba(100,160,220,0.07);
      transition: background 0.1s;
      overflow: hidden;
    }
    .cal-day:hover { background: color-mix(in srgb, var(--color-bg) 25%, white); }
    .cal-day.today .day-num {
      background: var(--color-accent);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .day-num {
      font-size: 12px;
      font-weight: 600;
      color: #334455;
      line-height: 1;
    }
    .event-chip {
      font-size: 9px;
      background: color-mix(in srgb, var(--color-accent) 15%, white);
      color: var(--color-accent);
      border-radius: 3px;
      padding: 1px 3px;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }
    .event-more {
      font-size: 8px;
      color: #99bbcc;
    }

    /* ── 일정 모달 ── */
    .day-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .day-modal {
      background: var(--color-card);
      border: 2px solid var(--color-border);
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .day-modal-header {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--color-bg) 80%, white),
        color-mix(in srgb, var(--color-bg) 60%, white)
      );
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: bold;
      color: var(--color-accent);
      border-bottom: 1px solid var(--color-border);
    }
    .day-modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #99bbcc;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #day-event-list { padding: 8px 12px 0; min-height: 40px; }
    .no-events {
      text-align: center;
      color: #aabbcc;
      font-size: 12px;
      padding: 16px 0 8px;
    }
    .ev-item {
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 30%, white);
      padding: 6px 0;
    }
    .ev-item:last-child { border-bottom: none; }
    .ev-item-main {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #334455;
    }
    .ev-time-badge {
      background: color-mix(in srgb, var(--color-accent) 12%, white);
      color: var(--color-accent);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 10px;
      flex-shrink: 0;
    }
    .ev-item-detail {
      padding: 6px 0 4px 32px;
      font-size: 12px;
      color: #99bbcc;
    }
    .ev-memo-text { margin-bottom: 6px; white-space: pre-wrap; }
    .ev-item-actions { display: flex; gap: 8px; }
    .ev-item-actions button {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--color-accent);
      cursor: pointer;
      font-family: inherit;
    }
    .day-add-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 10px 12px 12px;
      padding: 9px;
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .ev-form-inner { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .ev-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;

</head>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

  <script>
    // ── Firebase 초기화 ────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBDjYuZqK51RVaNGwsHHz7y-0ag7kGq4U0",
      authDomain: "routine-keeper-7c152.firebaseapp.com",
      projectId: "routine-keeper-7c152",
      storageBucket: "routine-keeper-7c152.firebasestorage.app",
      messagingSenderId: "589181570115",
      appId: "1:589181570115:web:6ec15a8f5ecd948ad618f6",
      measurementId: "G-73SYTBTKM0"
    };

    // ── 테마 (색상 커스터마이징) ──────────────────────────
    const DEFAULT_THEME = {
      bg:     '#b2e0f7',
      border: '#88ccee',
      accent: '#4488bb',
      card:   '#ffffff',
    };

    const COLOR_PICKER_CONFIG = [
      {
        key: 'bg',
        label: '🌈 배경 색',
        swatches: ['#b2e0f7','#ffd0e8','#c8f0d8','#f0d8f8','#ffeec8'],
      },
      {
        key: 'border',
        label: '🖼 테두리 색',
        swatches: ['#88ccee','#ffaad4','#88ccb8','#cc99ee','#ffbb88'],
      },
      {
        key: 'accent',
        label: '✨ 포인트 색',
        swatches: ['#4488bb','#cc4477','#339977','#8855cc','#cc7733'],
      },
      {
        key: 'card',
        label: '🗂 카드 배경',
        swatches: ['#ffffff','#f8fdff','#fff8fc','#f8fff8','#fffaf4'],
      },
    ];

    function applyTheme(theme) {
      const t = theme || DEFAULT_THEME;
      const root = document.documentElement.style;
      root.setProperty('--color-bg',     t.bg);
      root.setProperty('--color-border', t.border);
      root.setProperty('--color-accent', t.accent);
      root.setProperty('--color-card',   t.card);
    }

    function saveTheme(theme) {
      localStorage.setItem('cy_theme', JSON.stringify(theme));
      applyTheme(theme);
    }

    function loadTheme() {
      try {
        const stored = localStorage.getItem('cy_theme');
        if (!stored) return DEFAULT_THEME;
        const t = JSON.parse(stored);
        const hexRe = /^#[0-9a-fA-F]{6}$/;
        if (!hexRe.test(t.bg) || !hexRe.test(t.border) || !hexRe.test(t.accent) || !hexRe.test(t.card)) return DEFAULT_THEME;
        return t;
      } catch {
        return DEFAULT_THEME;
      }
    }

    firebase.initializeApp(firebaseConfig);
    applyTheme(loadTheme());
    const auth = firebase.auth();
    const db   = firebase.firestore();

    db.enablePersistence().catch(err => {
      console.warn('오프라인 퍼시스턴스 사용 불가:', err.code);
    });

    let currentUser = null;

    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => console.error('로그인 실패:', err));
    }

    function handleSignOut() {
      auth.signOut();
    }

    // ── 상수 ──────────────────────────────────────────
    const DEFAULT_ROUTINES = [
      "🪟 환기",
      "🕯️ 향 피우기",
      "🛏️ 이불 정리",
      "🧹 청소기 돌리기",
      "🐱 콩이 화장실 정리",
    ];

    let currentRoutines = [];
    let routineEditMode = false;
    let todoAddMode = false;
    let currentTab = 'today';
    let statsYear  = new Date().getFullYear();
    let statsMonth = new Date().getMonth() + 1;
    let calViewYear  = new Date().getFullYear();
    let calViewMonth = new Date().getMonth() + 1;
    let currentModalDate = null;
    let editingEventId   = null;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── 날짜 유틸 ─────────────────────────────────────
    function getTodayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getTodayLabel() {
      const d = new Date();
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${weekdays[d.getDay()]}요일`;
    }

    function getCurrentMonthLabel() {
      const d = new Date();
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
    }

    function addOneDay(dateKey) {
      const [y, m, d] = dateKey.split('-').map(Number);
      const dt = new Date(y, m - 1, d + 1);
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    }

    function subtractOneDay(dateKey) {
      const [y, m, d] = dateKey.split('-').map(Number);
      const dt = new Date(y, m - 1, d - 1);
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    }

    // ── localStorage 유틸 (마이그레이션용) ───────────
    function safeParseJSON(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || '{}');
      } catch (e) {
        localStorage.removeItem(key);
        return {};
      }
    }

    // ── 이벤트 Firestore 함수 ─────────────────────────
    async function loadEventsForMonth(year, month) {
      const pad = n => String(n).padStart(2, '0');
      const start = `${year}-${pad(month)}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      const end     = `${year}-${pad(month)}-${pad(lastDay)}`;
      const snap = await db.collection('users').doc(currentUser.uid)
        .collection('events')
        .where('date', '>=', start)
        .where('date', '<=', end)
        .get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    async function loadEventsForDay(dateKey) {
      const snap = await db.collection('users').doc(currentUser.uid)
        .collection('events')
        .where('date', '==', dateKey)
        .get();
      const events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      events.sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
      return events;
    }

    async function loadEventById(eventId) {
      const doc = await db.collection('users').doc(currentUser.uid)
        .collection('events').doc(eventId).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    }

    async function saveEvent(data) {
      await db.collection('users').doc(currentUser.uid)
        .collection('events').add({
          ...data,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
    }

    async function updateEvent(eventId, data) {
      await db.collection('users').doc(currentUser.uid)
        .collection('events').doc(eventId).update(data);
    }

    async function deleteEvent(eventId) {
      await db.collection('users').doc(currentUser.uid)
        .collection('events').doc(eventId).delete();
    }

    // ── Firestore 데이터 함수 ─────────────────────────
    async function saveRoutineCheck(dateKey, routineName, checked) {
      await db.collection('users').doc(currentUser.uid)
              .collection('routines').doc(dateKey)
              .set({ [routineName]: checked }, { merge: true });
    }

    async function loadRoutineChecks(dateKey) {
      const doc = await db.collection('users').doc(currentUser.uid)
                           .collection('routines').doc(dateKey).get();
      return doc.exists ? doc.data() : {};
    }

    async function loadRoutineList() {
      const doc = await db.collection('users').doc(currentUser.uid)
                           .collection('settings').doc('app').get();
      return doc.exists ? doc.data().routines : null;
    }

    async function saveRoutineList(routines) {
      await db.collection('users').doc(currentUser.uid)
              .collection('settings').doc('app')
              .set({ routines }, { merge: true });
    }

    async function initRoutineSettings() {
      const existing = await loadRoutineList();
      if (existing !== null) {
        currentRoutines = existing;
      } else {
        currentRoutines = [...DEFAULT_ROUTINES];
        await saveRoutineList(currentRoutines);
      }
    }

    async function loadTodoList() {
      const doc = await db.collection('users').doc(currentUser.uid)
                           .collection('todos').doc('list').get();
      return doc.exists ? (doc.data().items || []) : [];
    }

    async function saveTodoList(items) {
      await db.collection('users').doc(currentUser.uid)
              .collection('todos').doc('list')
              .set({ items });
    }

    async function loadMonthRoutineChecks(year, month) {
      const m = String(month).padStart(2, '0');
      const daysInMonth = new Date(year, month, 0).getDate();
      const dateKeys = [];
      for (let d = 1; d <= daysInMonth; d++) {
        dateKeys.push(`${year}-${m}-${String(d).padStart(2, '0')}`);
      }
      const docs = await Promise.all(
        dateKeys.map(k =>
          db.collection('users').doc(currentUser.uid)
            .collection('routines').doc(k).get()
        )
      );
      const result = {};
      dateKeys.forEach((k, i) => {
        result[k] = docs[i].exists ? docs[i].data() : {};
      });
      return result;
    }

    async function loadAllRoutineChecks() {
      const snap = await db.collection('users').doc(currentUser.uid)
                            .collection('routines').get();
      const result = {};
      snap.forEach(doc => { result[doc.id] = doc.data(); });
      return result;
    }

    function calcStreakInfo(allChecks, routines, year, month) {
      if (routines.length === 0) return { current: 0, monthBest: 0, allTimeBest: 0 };
      const today = getTodayKey();

      const isAllDone = (key) => {
        const checks = allChecks[key] || {};
        return routines.every(r => checks[r]);
      };

      // 오늘부터 역순으로 연속 달성일 계산
      let current = 0;
      let key = today;
      while (isAllDone(key)) {
        current++;
        key = subtractOneDay(key);
        if (key < '2020-01-01') break; // 무한루프 방지
      }

      // 날짜 배열에서 가장 긴 연속 구간 계산
      const longestInKeys = (keys) => {
        let best = 0, cur = 0, prev = null;
        for (const k of keys) {
          if (isAllDone(k)) {
            cur = (prev && addOneDay(prev) === k) ? cur + 1 : 1;
            best = Math.max(best, cur);
          } else {
            cur = 0;
          }
          prev = k;
        }
        return best;
      };

      const allDates = Object.keys(allChecks).filter(k => k <= today).sort();
      const allTimeBest = longestInKeys(allDates);

      const m = String(month).padStart(2, '0');
      const monthDates = allDates.filter(k => k.startsWith(`${year}-${m}`));
      const monthBest = longestInKeys(monthDates);

      return { current, monthBest, allTimeBest };
    }

    function calcMonthlyRates(monthChecks, routines, year, month) {
      if (routines.length === 0) return [];
      const today = getTodayKey();
      const m = String(month).padStart(2, '0');
      const daysInMonth = new Date(year, month, 0).getDate();
      const doneCounts = Object.fromEntries(routines.map(r => [r, 0]));
      let totalDays = 0;

      for (let d = 1; d <= daysInMonth; d++) {
        const k = `${year}-${m}-${String(d).padStart(2, '0')}`;
        if (k > today) break;
        totalDays++;
        const checks = monthChecks[k] || {};
        routines.forEach(r => { if (checks[r]) doneCounts[r]++; });
      }

      return routines.map(name => ({
        name,
        rate: totalDays > 0 ? Math.round(doneCounts[name] / totalDays * 100) : 0,
      }));
    }

    // ── localStorage → Firestore 마이그레이션 ─────────
    async function migrateFromLocalStorage() {
      const routinesData = safeParseJSON('routines');
      if (Object.keys(routinesData).length === 0) return;

      const batch   = db.batch();
      const userRef = db.collection('users').doc(currentUser.uid);
      for (const [dateKey, checks] of Object.entries(routinesData)) {
        batch.set(userRef.collection('routines').doc(dateKey), checks);
      }

      await batch.commit();
      localStorage.removeItem('routines');
    }

    async function updateStreakBadge() {
      const badge = document.getElementById('streak-header-badge');
      if (!badge) return;
      try {
        const allChecks = await loadAllRoutineChecks();
        const { current } = calcStreakInfo(allChecks, currentRoutines, statsYear, statsMonth);
        if (current > 0) {
          badge.textContent = `🔥 ${current}일 연속`;
          badge.style.display = '';
        } else {
          badge.style.display = 'none';
        }
      } catch {
        badge.style.display = 'none';
      }
    }

    // ── 메인 화면 ─────────────────────────────────────
    async function renderMain() {
      const today = getTodayKey();
      const [checks, allTodos] = await Promise.all([
        loadRoutineChecks(today),
        loadTodoList(),
      ]);

      document.getElementById('date-hint-bar').textContent = getTodayLabel();

      if (currentUser && currentUser.displayName) {
        document.getElementById('user-display-name').textContent = currentUser.displayName + '의 홈';
      }

      // ── 루틴 섹션 ──
      const routineSection = document.getElementById('routine-section');
      routineSection.innerHTML = '';

      const routineHeader = document.createElement('div');
      routineHeader.className = 'section-header';
      routineHeader.innerHTML = `
        <span class="section-title">✅ 매일 루틴</span>
        <button class="section-btn" onclick="toggleRoutineEdit()">
          ${routineEditMode ? '완료' : '편집'}
        </button>
      `;
      routineSection.appendChild(routineHeader);

      const routineList = document.createElement('div');
      routineList.id = 'routine-list';
      routineSection.appendChild(routineList);

      currentRoutines.forEach((name, index) => {
        if (routineEditMode) {
          const item = document.createElement('div');
          item.className = 'routine-item';
          item.dataset.routine = name;
          item.innerHTML = `
            <span class="drag-handle">≡</span>
            <span class="routine-name">${escapeHtml(name)}</span>
            <button class="routine-delete" onclick="deleteRoutine(${index})">✕</button>
          `;
          routineList.appendChild(item);
        } else {
          const isChecked = checks[name] || false;
          const item = document.createElement('label');
          item.className = 'routine-item' + (isChecked ? ' done' : '');
          item.innerHTML = `
            <input type="checkbox" ${isChecked ? 'checked' : ''}
                   onchange='toggleRoutine(${JSON.stringify(name)}, this.checked)'>
            <span class="routine-name">${escapeHtml(name)}</span>
          `;
          routineList.appendChild(item);
        }
      });

      if (routineEditMode) {
        Sortable.create(routineList, {
          handle: '.drag-handle',
          animation: 150,
          onEnd() {
            const newOrder = Array.from(routineList.querySelectorAll('[data-routine]'))
              .map(el => el.dataset.routine);
            currentRoutines = newOrder;
            saveRoutineList(currentRoutines);
          }
        });

        const addRow = document.createElement('div');
        addRow.className = 'add-input-row';
        addRow.innerHTML = `
          <input class="add-input" id="new-routine-input" placeholder="새 루틴 입력..."
                 onkeydown="if(event.key==='Enter')addRoutine()">
          <button class="add-btn" onclick="addRoutine()">추가</button>
        `;
        routineSection.appendChild(addRow);
      }

      const progressEl = document.createElement('div');
      progressEl.className = 'progress';
      const routineDoneCount = currentRoutines.filter(name => checks[name]).length;
      progressEl.textContent = `${routineDoneCount} / ${currentRoutines.length} 완료`;
      routineSection.appendChild(progressEl);

      // ── 할 일 섹션 ──
      const visibleTodos = allTodos.filter(t => !t.done || t.doneDate === today);
      if (visibleTodos.length !== allTodos.length) {
        await saveTodoList(visibleTodos);
      }

      const todoSection = document.getElementById('todo-section');
      todoSection.innerHTML = '';

      const todoHeader = document.createElement('div');
      todoHeader.className = 'section-header';
      todoHeader.innerHTML = `
        <span class="section-title">📋 오늘의 할 일</span>
        <button class="section-btn" onclick="showTodoInput()">+</button>
      `;
      todoSection.appendChild(todoHeader);

      visibleTodos.forEach(item => {
        const el = document.createElement('div');
        el.className = 'todo-item' + (item.done ? ' done' : '');
        el.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''}
                 onchange='toggleTodo(${JSON.stringify(item.id)}, this.checked)'>
          <span class="todo-text">${escapeHtml(item.text)}</span>
          <button class="todo-delete" onclick='deleteTodo(${JSON.stringify(item.id)})'>✕</button>
        `;
        todoSection.appendChild(el);
      });

      if (todoAddMode) {
        const addRow = document.createElement('div');
        addRow.className = 'add-input-row';
        addRow.innerHTML = `
          <input class="add-input" id="new-todo-input" placeholder="할 일 입력..."
                 onkeydown="if(event.key==='Enter')addTodo()">
          <button class="add-btn" onclick="addTodo()">추가</button>
        `;
        todoSection.appendChild(addRow);
        setTimeout(() => {
          const el = document.getElementById('new-todo-input');
          if (el) el.focus();
        }, 50);
      }

      // 헤더 스트릭 뱃지 비동기 업데이트
      updateStreakBadge();
    }

    async function toggleRoutine(name, checked) {
      await saveRoutineCheck(getTodayKey(), name, checked);
      await renderMain();
    }

    async function toggleRoutineEdit() {
      if (routineEditMode) {
        routineEditMode = false;
        await saveRoutineList(currentRoutines);
      } else {
        routineEditMode = true;
      }
      await renderMain();
    }

    async function deleteRoutine(index) {
      currentRoutines.splice(index, 1);
      await renderMain();
    }

    async function addRoutine() {
      const input = document.getElementById('new-routine-input');
      const name = input.value.trim();
      if (!name) return;
      currentRoutines.push(name);
      input.value = '';
      await renderMain();
      const newInput = document.getElementById('new-routine-input');
      if (newInput) newInput.focus();
    }

    function showTodoInput() {
      todoAddMode = true;
      renderMain();
    }

    async function addTodo() {
      const input = document.getElementById('new-todo-input');
      const text = input.value.trim();
      if (!text) return;
      const items = await loadTodoList();
      items.push({
        id: crypto.randomUUID(),
        text,
        done: false,
        doneDate: null,
      });
      await saveTodoList(items);
      todoAddMode = false;
      await renderMain();
    }

    async function toggleTodo(id, checked) {
      const today = getTodayKey();
      const items = await loadTodoList();
      const item = items.find(i => i.id === id);
      if (item) {
        item.done = checked;
        item.doneDate = checked ? today : null;
      }
      await saveTodoList(items);
      await renderMain();
    }

    async function deleteTodo(id) {
      const items = await loadTodoList();
      await saveTodoList(items.filter(i => i.id !== id));
      await renderMain();
    }

    async function resetMonthRoutines() {
      const label = `${statsYear}년 ${statsMonth}월`;
      if (!window.confirm(`${label} 루틴 기록을 모두 삭제할까요?`)) return;
      const m = String(statsMonth).padStart(2, '0');
      const daysInMonth = new Date(statsYear, statsMonth, 0).getDate();
      const batch = db.batch();
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${statsYear}-${m}-${String(d).padStart(2, '0')}`;
        batch.delete(
          db.collection('users').doc(currentUser.uid).collection('routines').doc(key)
        );
      }
      try {
        await batch.commit();
        await renderStats();
      } catch (error) {
        console.error('삭제 실패:', error);
        alert('삭제에 실패했습니다. 다시 시도해주세요.');
      }
    }

    async function resetAllRoutines() {
      if (!window.confirm('모든 루틴 기록을 삭제할까요? 되돌릴 수 없어요.')) return;
      if (!window.confirm('정말요? 전체 기록이 삭제됩니다.')) return;
      const snap = await db.collection('users').doc(currentUser.uid)
                            .collection('routines').get();
      const batch = db.batch();
      snap.forEach(doc => batch.delete(doc.ref));
      try {
        await batch.commit();
        await renderStats();
      } catch (error) {
        console.error('삭제 실패:', error);
        alert('삭제에 실패했습니다. 다시 시도해주세요.');
      }
    }

    async function renderStats() {
      const panel = document.getElementById('panel-stats');
      if (!panel) return;
      panel.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">로딩 중...</div>';

      try {
        const todayDate   = new Date();
        const currentYear = todayDate.getFullYear();
        const currentMon  = todayDate.getMonth() + 1;
        const isCurrentMonth = statsYear === currentYear && statsMonth === currentMon;

        const m = String(statsMonth).padStart(2, '0');
        const daysInMonth = new Date(statsYear, statsMonth, 0).getDate();
        const today = getTodayKey();

        const [monthChecks, allChecks] = await Promise.all([
          loadMonthRoutineChecks(statsYear, statsMonth),
          loadAllRoutineChecks(),
        ]);

        const { current, monthBest, allTimeBest } =
          calcStreakInfo(allChecks, currentRoutines, statsYear, statsMonth);
        const rates = calcMonthlyRates(monthChecks, currentRoutines, statsYear, statsMonth);

        // 달력 셀 HTML
        const firstWeekday = new Date(statsYear, statsMonth - 1, 1).getDay();
        let calCells = ['일','월','화','수','목','금','토']
          .map(w => `<div class="stats-cal-header">${w}</div>`).join('');
        for (let i = 0; i < firstWeekday; i++) calCells += '<div></div>';
        for (let d = 1; d <= daysInMonth; d++) {
          const key  = `${statsYear}-${m}-${String(d).padStart(2,'0')}`;
          const done = currentRoutines.length > 0 &&
                       currentRoutines.every(r => (monthChecks[key] || {})[r]);
          let cls;
          if (key > today)      cls = 'future';
          else if (key === today) cls = done ? 'today done' : 'today';
          else                  cls = done ? 'done' : 'missed';
          calCells += `<div class="stats-cal-day ${cls}">${d}</div>`;
        }

        // 달성률 바 HTML
        const rateBars = rates.map(({ name, rate }) => `
          <div class="rate-row">
            <div class="rate-header">
              <span>${name}</span>
              <span style="color:${rate >= 70 ? 'var(--color-accent)' : '#f0956a'};font-weight:700">${rate}%</span>
            </div>
            <div class="rate-bar-bg">
              <div class="rate-bar-fill ${rate >= 70 ? 'good' : 'low'}" style="width:${Math.min(100, rate)}%"></div>
            </div>
          </div>
        `).join('');

        panel.innerHTML = `
          <div class="stats-nav">
            <div style="display:flex;align-items:center;gap:12px">
              <button class="section-btn" onclick="statsNavMonth(-1)">‹</button>
              <span style="font-size:15px;font-weight:700">${statsYear}년 ${statsMonth}월</span>
              <button class="section-btn" onclick="statsNavMonth(1)"
                ${isCurrentMonth ? 'disabled style="opacity:0.3;cursor:default"' : ''}>›</button>
            </div>
            <button class="stats-reset-btn" onclick="resetMonthRoutines()">🗑 이달 초기화</button>
          </div>

          <div class="streak-card">
            <div class="streak-item">
              <div class="streak-num">🔥 ${current}</div>
              <div class="streak-label">일 연속 달성 중</div>
            </div>
            <div class="streak-divider"></div>
            <div class="streak-item">
              <div class="streak-num">${monthBest}</div>
              <div class="streak-label">이번 달 최장</div>
            </div>
            <div class="streak-divider"></div>
            <div class="streak-item">
              <div class="streak-num">${allTimeBest}</div>
              <div class="streak-label">역대 최장</div>
            </div>
          </div>

          <div class="stats-section-title">📅 달성 현황</div>
          <div class="stats-cal-grid">${calCells}</div>
          <div class="stats-cal-legend">
            <span><span class="legend-dot" style="background:var(--color-bg)"></span>전체 완료</span>
            <span><span class="legend-dot" style="background:color-mix(in srgb, var(--color-bg) 40%, white);border:1.5px solid var(--color-border);box-sizing:border-box"></span>오늘</span>
            <span><span class="legend-dot" style="background:#f5f5f5"></span>미완료</span>
          </div>

          <div class="stats-section-title">📊 루틴별 달성률</div>
          ${rateBars || '<div style="font-size:13px;color:#aaa;text-align:center;padding:10px 0">루틴이 없어요</div>'}

          <div class="full-reset-area">
            <button class="full-reset-btn" onclick="resetAllRoutines()">전체 기록 초기화</button>
          </div>
        `;
      } catch (e) {
        console.error('통계 로드 실패:', e);
        panel.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">불러오기 실패. 다시 시도해주세요.</div>';
      }
    }

    // ── 화면 전환 ─────────────────────────────────────
    function showScreen(name) {
      document.getElementById('screen-login').style.display    = name === 'login'    ? '' : 'none';
      document.getElementById('screen-main').style.display     = name === 'main'     ? '' : 'none';
      document.getElementById('screen-schedule').style.display = name === 'schedule' ? '' : 'none';
      document.getElementById('screen-settings').style.display = name === 'settings' ? '' : 'none';
      ['home','schedule','settings'].forEach(id => {
        const el = document.getElementById('nav-' + id);
        if (el) el.classList.remove('active');
      });
      if (name === 'main')     { const el = document.getElementById('nav-home');     if (el) el.classList.add('active'); }
      if (name === 'schedule') { const el = document.getElementById('nav-schedule'); if (el) el.classList.add('active'); renderCalendar(); }
      if (name === 'settings') { const el = document.getElementById('nav-settings'); if (el) el.classList.add('active'); }
      if (name === 'settings') renderSettings();
      if (name === 'main') {
        if (currentTab !== 'today') switchTab('today');
        renderMain();
      }
    }

    function renderSettings() {
      const theme = loadTheme();
      const container = document.getElementById('color-pickers');
      container.innerHTML = '';

      COLOR_PICKER_CONFIG.forEach(({ key, label, swatches }) => {
        const row = document.createElement('div');
        row.className = 'color-row';

        const swatchesHtml = swatches.map(color => `
          <div class="swatch ${theme[key] === color ? 'active' : ''}"
               style="background:${color}"
               data-key="${key}" data-color="${color}"
               onclick="onSwatchClick(this)"></div>
        `).join('');

        row.innerHTML = `
          <span class="color-row-label">${label}</span>
          <div class="color-row-right">
            <div class="swatches">${swatchesHtml}</div>
            <input class="hex-input" id="hex-${key}" value="${theme[key].replace(/"/g, '&quot;').replace(/'/g, '&#39;')}"
                   oninput="onHexInput(this, '${key}')" maxlength="7" />
          </div>
        `;
        container.appendChild(row);
      });
    }

    function onSaveTheme() {
      const theme = {};
      COLOR_PICKER_CONFIG.forEach(({ key }) => {
        const val = document.getElementById('hex-' + key).value.trim();
        theme[key] = /^#[0-9a-fA-F]{6}$/.test(val) ? val : DEFAULT_THEME[key];
      });
      saveTheme(theme);
      showScreen('main');
    }

    function onSwatchClick(el) {
      const key = el.dataset.key;
      const color = el.dataset.color;
      document.querySelectorAll(`.swatch[data-key="${key}"]`).forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('hex-' + key).value = color;
    }

    function onHexInput(el, key) {
      const val = el.value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        document.querySelectorAll(`.swatch[data-key="${key}"]`).forEach(s => s.classList.remove('active'));
      }
    }

    // ── 달력 화면 ─────────────────────────────────────
    async function renderCalendar() {
      if (!currentUser) return;
      const year  = calViewYear;
      const month = calViewMonth;

      document.getElementById('schedule-month').textContent = `${year}년 ${month}월`;

      try {
        const events = await loadEventsForMonth(year, month);
        const byDate = {};
        events.forEach(ev => {
          if (!byDate[ev.date]) byDate[ev.date] = [];
          byDate[ev.date].push(ev);
        });

        const firstWeekday = new Date(year, month - 1, 1).getDay();
        const daysInMonth  = new Date(year, month, 0).getDate();
        const todayKey     = getTodayKey();

        const cal = document.getElementById('calendar');
        cal.innerHTML = '';

        ['일','월','화','수','목','금','토'].forEach(w => {
          const h = document.createElement('div');
          h.className = 'cal-dow';
          h.textContent = w;
          cal.appendChild(h);
        });

        for (let i = 0; i < firstWeekday; i++) {
          cal.appendChild(document.createElement('div'));
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const m   = String(month).padStart(2, '0');
          const d   = String(day).padStart(2, '0');
          const dateKey  = `${year}-${m}-${d}`;
          const dayEvs   = byDate[dateKey] || [];

          const cell = document.createElement('div');
          cell.className = 'cal-day' + (dateKey === todayKey ? ' today' : '');

          const numSpan = document.createElement('span');
          numSpan.className = 'day-num';
          numSpan.textContent = day;
          cell.appendChild(numSpan);

          if (dayEvs.length > 0) {
            const chip = document.createElement('span');
            chip.className = 'event-chip';
            chip.textContent = dayEvs[0].title;
            cell.appendChild(chip);
            if (dayEvs.length > 1) {
              const more = document.createElement('span');
              more.className = 'event-more';
              more.textContent = `+${dayEvs.length - 1}`;
              cell.appendChild(more);
            }
          }

          cell.onclick = () => openDayModal(dateKey);
          cal.appendChild(cell);
        }
      } catch (e) {
        const cal = document.getElementById('calendar');
        if (cal) cal.innerHTML = '<p style="text-align:center;color:#aabbcc;padding:20px;font-size:12px;">일정을 불러오지 못했어요</p>';
      }
    }

    async function calNavMonth(delta) {
      calViewMonth += delta;
      if (calViewMonth > 12) { calViewYear++;  calViewMonth = 1; }
      if (calViewMonth < 1)  { calViewYear--;  calViewMonth = 12; }
      await renderCalendar();
    }

    // ── 일정 모달 ─────────────────────────────────────
    async function openDayModal(dateKey) {
      currentModalDate = dateKey;
      editingEventId   = null;

      const [y, m, d]  = dateKey.split('-').map(Number);
      const weekdays   = ['일','월','화','수','목','금','토'];
      const dt         = new Date(y, m - 1, d);
      document.getElementById('day-modal-title').textContent =
        `${y}년 ${m}월 ${d}일 (${weekdays[dt.getDay()]})`;

      document.getElementById('day-modal-overlay').style.display = '';
      showEventList();
      await renderDayEventList(dateKey);
    }

    function closeDayModal() {
      document.getElementById('day-modal-overlay').style.display = 'none';
      currentModalDate = null;
      editingEventId   = null;
    }

    function onModalOverlayClick(e) {
      if (e.target === document.getElementById('day-modal-overlay')) closeDayModal();
    }

    async function renderDayEventList(dateKey) {
      const events = await loadEventsForDay(dateKey);
      const list   = document.getElementById('day-event-list');
      list.innerHTML = '';

      if (events.length === 0) {
        list.innerHTML = '<p class="no-events">등록된 일정이 없어요</p>';
        return;
      }

      events.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'ev-item';
        const timeStr = ev.time || '종일';
        item.innerHTML = `
          <div class="ev-item-main" onclick="toggleEvDetail('${escapeHtml(ev.id)}')">
            <span class="ev-time-badge">${escapeHtml(timeStr)}</span>
            <span>${escapeHtml(ev.title)}</span>
          </div>
          <div class="ev-item-detail" id="ev-detail-${escapeHtml(ev.id)}" style="display:none">
            <p class="ev-memo-text">${ev.memo ? escapeHtml(ev.memo) : ''}</p>
            <div class="ev-item-actions">
              <button onclick="showEventForm('${escapeHtml(ev.date)}','${escapeHtml(ev.id)}')">수정</button>
              <button onclick="confirmDeleteEvent('${escapeHtml(ev.id)}')">삭제</button>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function toggleEvDetail(evId) {
      const el = document.getElementById('ev-detail-' + evId);
      if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    function showEventList() {
      document.getElementById('day-modal-list').style.display = '';
      document.getElementById('day-modal-form').style.display = 'none';
    }

    async function showEventForm(dateKey, eventId) {
      if (!dateKey) return;
      editingEventId = eventId || null;
      document.getElementById('day-modal-list').style.display = 'none';
      document.getElementById('day-modal-form').style.display = '';

      document.getElementById('ev-title').value = '';
      document.getElementById('ev-time').value  = '';
      document.getElementById('ev-memo').value  = '';

      if (eventId) {
        const ev = await loadEventById(eventId);
        if (!ev) {
          showEventList();
          return;
        }
        document.getElementById('ev-title').value = ev.title;
        document.getElementById('ev-time').value  = ev.time  || '';
        document.getElementById('ev-memo').value  = ev.memo  || '';
      }
      updateSaveBtn();
    }

    function updateSaveBtn() {
      const title = document.getElementById('ev-title').value.trim();
      document.getElementById('ev-save-btn').disabled = !title;
    }

    async function saveEventForm() {
      if (!currentUser || !currentModalDate) return;
      const title = document.getElementById('ev-title').value.trim();
      if (!title) return;
      const time = document.getElementById('ev-time').value  || null;
      const memo = document.getElementById('ev-memo').value.trim() || null;

      try {
        if (editingEventId) {
          await updateEvent(editingEventId, { title, time, memo });
        } else {
          await saveEvent({ date: currentModalDate, title, time, memo });
        }
        showEventList();
        await renderDayEventList(currentModalDate);
        await renderCalendar();
      } catch (e) {
        alert('일정 저장에 실패했어요. 다시 시도해주세요.');
      }
    }

    async function confirmDeleteEvent(eventId) {
      if (!confirm('이 일정을 삭제할까요?')) return;
      try {
        await deleteEvent(eventId);
        await renderDayEventList(currentModalDate);
        await renderCalendar();
      } catch (e) {
        alert('일정 삭제에 실패했어요. 다시 시도해주세요.');
      }
    }

    // ── 탭 전환 ───────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('panel-today').style.display = tab === 'today' ? '' : 'none';
      document.getElementById('panel-stats').style.display = tab === 'stats' ? '' : 'none';
      document.getElementById('tab-today').classList.toggle('active', tab === 'today');
      document.getElementById('tab-stats').classList.toggle('active', tab === 'stats');
      if (tab === 'stats') renderStats();
    }

    function statsNavMonth(delta) {
      statsMonth += delta;
      if (statsMonth > 12) { statsYear++;  statsMonth = 1; }
      if (statsMonth < 1)  { statsYear--;  statsMonth = 12; }
      renderStats();
    }

    // ── 앱 시작 ───────────────────────────────────────
    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        await migrateFromLocalStorage();
        await initRoutineSettings();
        showScreen('main');
      } else {
        routineEditMode = false;
        todoAddMode = false;
        showScreen('login');
      }
    });
  </script>

</body>
