<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루틴 지킴이</title>
  <style>
    /* Task 2에서 채운다 */
  </style>
</head>
<body>

  <!-- 메인 화면 -->
  <div id="screen-main">
    <div class="header">
      <span id="today-date">날짜 로딩 중...</span>
      <button onclick="showScreen('schedule')">📅 스케줄 설정</button>
    </div>
    <div class="card">
      <div class="shift-row">
        <h1>오늘</h1>
        <span id="shift-badge" class="badge badge-none">미설정</span>
      </div>
      <div id="timing-hint" class="hint">오늘 스케줄을 먼저 설정해줘요</div>
      <div id="routine-list" class="routine-list"></div>
      <div id="progress" class="progress">0 / 5 완료</div>
    </div>
  </div>

  <!-- 스케줄 설정 화면 (기본 숨김) -->
  <div id="screen-schedule" style="display:none">
    <div class="header">
      <button onclick="showScreen('main')">← 뒤로</button>
      <span id="schedule-month"></span>
    </div>
    <p class="cal-guide">날짜를 클릭하면 A조 → C조 → DO → 비움 순으로 바뀌어요</p>
    <div id="calendar" class="calendar"></div>
  </div>

  <script>
    /* Task 4~6에서 채운다 */
  </script>

</body>
</html>
